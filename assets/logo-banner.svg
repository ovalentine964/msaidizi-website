<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8853D"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="tagline-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8853D"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <!-- Kanga-inspired geometric pattern -->
    <pattern id="kanga" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none"/>
      <path d="M12,0 L24,12 L12,24 L0,12Z" fill="none" stroke="#E8853D" stroke-width="0.3" opacity="0.06"/>
      <circle cx="12" cy="12" r="1.2" fill="#F5A623" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#kanga)"/>

  <!-- Warm community circles — subtle -->
  <circle cx="140" cy="200" r="160" fill="none" stroke="#E8853D" stroke-width="0.8" opacity="0.05"/>
  <circle cx="140" cy="200" r="140" fill="none" stroke="#F5A623" stroke-width="0.5" opacity="0.03"/>

  <!-- === ICON MARK (left side) === -->
  <g transform="translate(60, 50)">
    <!-- Rounded square bg -->
    <rect x="0" y="0" width="300" height="300" rx="60" ry="60" fill="#0F1B2D" stroke="#1E3A5F" stroke-width="2"/>

    <!-- Africa silhouette behind B -->
    <g opacity="0.07" fill="#F5A623">
      <path d="M148,52 C153,49 159,47 165,49 C170,51 173,54 175,59
               C177,64 179,71 182,78 C185,85 190,90 195,95
               C200,100 204,107 206,115 C208,123 206,131 203,137
               C200,143 195,148 192,155 C189,162 187,170 186,178
               C185,186 182,193 178,199 C174,205 169,211 166,219
               C163,227 161,235 158,243 C155,251 150,258 145,263
               C140,268 135,273 132,280 C129,287 127,292 124,295
               C121,298 116,298 113,293 C110,288 110,281 112,274
               C114,267 117,260 119,253 C121,246 121,239 119,232
               C117,225 114,220 111,215 C108,210 106,203 106,196
               C106,189 108,182 111,177 C114,172 117,167 119,160
               C121,153 121,146 119,139 C117,132 115,125 115,118
               C115,111 117,104 120,99 C123,94 126,89 130,84
               C134,79 136,72 138,65 C140,58 143,54 148,52Z"/>
    </g>

    <!-- B letterform -->
    <rect x="52" y="52" width="40" height="196" rx="10" fill="#FFFFFF"/>
    <path d="M92,52 L156,52 C184,52 208,76 208,104 C208,132 184,148 156,148 L92,148Z" fill="#FFFFFF"/>
    <path d="M92,162 L160,162 C186,162 210,184 210,210 C210,236 186,248 160,248 L92,248Z" fill="#FFFFFF"/>

    <!-- Pulse line -->
    <polyline points="92,155 116,155 128,133 142,177 154,125 168,157 184,153 218,153"
              fill="none" stroke="url(#pulse)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="128" cy="133" r="5" fill="#F5A623"/>
    <circle cx="154" cy="125" r="5" fill="#F5A623"/>
  </g>

  <!-- === WORDMARK (right side) === -->
  <g transform="translate(420, 0)">
    <!-- "Biashara" in bold white -->
    <text x="0" y="175" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Biashara</text>

    <!-- "Intelligence" — slightly warmer than before -->
    <text x="0" y="265" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="400" fill="#9AABBF" letter-spacing="6">Intelligence</text>

    <!-- Tagline with warm gradient -->
    <text x="0" y="320" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="url(#tagline-grad)" letter-spacing="3">ECONOMIC INTELLIGENCE FOR AFRICA</text>
  </g>

  <!-- Decorative accent line under tagline -->
  <rect x="420" y="340" width="80" height="3" rx="1.5" fill="#E8853D" opacity="0.5"/>

  <!-- Subtle kanga accent dots along bottom edge -->
  <circle cx="100" cy="380" r="2" fill="#E8853D" opacity="0.08"/>
  <circle cx="200" cy="385" r="1.5" fill="#F5A623" opacity="0.06"/>
  <circle cx="300" cy="380" r="2" fill="#E8853D" opacity="0.08"/>
  <circle cx="1050" cy="380" r="2" fill="#E8853D" opacity="0.08"/>
  <circle cx="1100" cy="385" r="1.5" fill="#F5A623" opacity="0.06"/>
  <circle cx="1150" cy="380" r="2" fill="#E8853D" opacity="0.08"/>
</svg>
